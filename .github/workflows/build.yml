name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyembroidery olefile customtkinter pywinauto pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name EmbroideryC --collect-all customtkinter main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: EmbroideryC
          path: dist/EmbroideryC.exe
