name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyembroidery olefile customtkinter pywinauto nuitka

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka --standalone --onefile --windows-console-mode=disable --enable-plugin=tk-inter --include-package=customtkinter --include-data-dir=customtkinter=customtkinter --output-filename=EmbroideryC.exe --company-name="FM Embroidery" --product-name="Embroidery Combiner" --file-version=1.0.0 --product-version=1.0.0 main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: EmbroideryC
          path: EmbroideryC.exe
