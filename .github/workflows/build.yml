name: Build Windows EXE

on:
  push:
    tags: ['v*']        # Build on version tags (v1.0.0, v1.0.1, etc.)
  workflow_dispatch:     # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyembroidery olefile customtkinter pywinauto pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name EmbroideryC --collect-all customtkinter main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmbroideryC
          path: dist/EmbroideryC.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EmbroideryC.exe
          generate_release_notes: true
